name: news_tracker
description: A simplified Inshorts-like news app using Flutter and NewsAPI
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.0.5

  # Networking
  http: ^1.1.0

  # Image caching
  cached_network_image: ^3.3.0

  # Date formatting
  intl: ^0.18.1

  # Optional: share news
  share_plus: ^7.2.0

  # Optional: open URL in browser
  url_launcher: ^6.1.14

  # 🔖 Bookmark storage (LOCAL STORAGE)
  shared_preferences: ^2.2.2

  # 🔥 Firebase (optional - keep if needed later)
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/