name: news_tracker
description: A simplified Inshorts-like news app using Flutter and NewsAPI
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.0.5

  # Networking
  http: ^1.1.0

  # Image caching
  cached_network_image: ^3.3.0

  # Date formatting
  intl: ^0.18.1

  # Optional: share news
  share_plus: ^7.2.0

  # Optional: open URL in browser
  url_launcher: ^6.1.14

  # 🔖 Bookmark storage (LOCAL STORAGE)
  shared_preferences: ^2.2.2

  # 🔥 Firebase (optional - keep if needed later)
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.17.0
  google_sign_in: ^6.2.1

  # 📦 App version info (for update checker)
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.jpeg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/Logo.jpeg"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/images/